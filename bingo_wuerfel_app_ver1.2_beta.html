<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplikations-Bingo mit n-seitigen Würfeln</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(99,102,241,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(16,185,129,0.16), transparent 24%),
        linear-gradient(180deg, #f8fafc, #eef2ff 45%, #f8fafc);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .glass {
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.76);
      box-shadow: 0 16px 40px rgba(15,23,42,0.10);
      border: 1px solid rgba(255,255,255,0.7);
    }
    .dice-face {
      background: linear-gradient(145deg, #ffffff, #eef2ff);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 14px 30px rgba(79,70,229,0.16);
      border: 1px solid rgba(99,102,241,0.16);
    }
    .bingo-cell { aspect-ratio: 1 / 1; }
    .bingo-preview {
      display: grid;
      gap: 0.4rem;
      background: #e2e8f0;
      padding: 0.4rem;
      border-radius: 1rem;
    }
    @keyframes dice-pop {
      0%   { transform: scale(0.7) rotate(-8deg); opacity: 0.4; }
      60%  { transform: scale(1.15) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes result-flip {
      0%   { transform: rotateY(90deg) scale(0.9); opacity: 0; }
      100% { transform: rotateY(0deg) scale(1);   opacity: 1; }
    }
    .animate-dice-pop  { animation: dice-pop  0.35s cubic-bezier(.22,.68,0,1.4) both; }
    .animate-result-flip { animation: result-flip 0.3s ease-out both; perspective: 600px; }

    /* Fullscreen overlay */
    .fs-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3rem;
    }
    .fs-dice-face {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 2.5rem;
      backdrop-filter: blur(8px);
    }

    @media print {
      .no-print { display: none !important; }
      body { background: white; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    // --- Web Audio API Synth für "Klack"-Sound ---
    function playDiceSound() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        function playTock(delay, pitch) {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          
          osc.type = 'sine'; // Sanfterer, hölzerner Klang
          osc.frequency.setValueAtTime(pitch, ctx.currentTime + delay);
          osc.frequency.exponentialRampToValueAtTime(pitch * 0.4, ctx.currentTime + delay + 0.08);
          
          gain.gain.setValueAtTime(0, ctx.currentTime + delay);
          gain.gain.linearRampToValueAtTime(1, ctx.currentTime + delay + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.1);
          
          osc.start(ctx.currentTime + delay);
          osc.stop(ctx.currentTime + delay + 0.1);
        }
        
        // Zwei schnelle "Klacks" nacheinander
        playTock(0, 450);
        playTock(0.07, 350);
      } catch (e) {
        console.warn('Audio wird nicht unterstützt', e);
      }
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildTaskPool(n) {
      const tasks = [];
      for (let a = 1; a <= n; a++) {
        for (let b = 1; b <= n; b++) {
          tasks.push({ a, b, product: a * b, id: `${a}x${b}` });
        }
      }
      return tasks;
    }

    function formatTask(task) {
      return `${task.a} · ${task.b}`;
    }

    function buildProductPool(n) {
      return Array.from(new Set(buildTaskPool(n).map(task => task.product)))
        .sort((a, b) => a - b)
        .map(product => ({ product, id: `p-${product}` }));
    }

    // --- Primes helpers ---
    function primesUpTo(n) {
      const sieve = Array(n + 1).fill(true);
      sieve[0] = sieve[1] = false;
      for (let i = 2; i * i <= n; i++) if (sieve[i]) for (let j = i * i; j <= n; j += i) sieve[j] = false;
      return Array.from({ length: n - 1 }, (_, i) => i + 2).filter(i => sieve[i]);
    }

    function buildPrimeTaskPool(n) {
      const ps = primesUpTo(n);
      const tasks = [];
      for (const a of ps) for (const b of ps) tasks.push({ a, b, product: a * b, id: `${a}x${b}` });
      return tasks;
    }

    function buildPrimeProductPool(n) {
      return Array.from(new Set(buildPrimeTaskPool(n).map(t => t.product)))
        .sort((a, b) => a - b)
        .map(product => ({ product, id: `p-${product}` }));
    }

    // --- Fractions helpers ---
    function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

    function buildFractionPool(n) {
      const seen = new Set();
      const pool = [];
      for (let a = 1; a <= n; a++) {
        for (let b = 1; b <= n; b++) {
          const g = gcd(a, b);
          const id = `${a/g}/${b/g}`;
          if (!seen.has(id)) {
            seen.add(id);
            pool.push({ a: a/g, b: b/g, id });
          }
        }
      }
      return pool;
    }

    function generateUniqueCardsFromPool({ pool, size, count }) {
      const cellsPerCard = size * size;
      if (pool.length < cellsPerCard) {
        throw new Error(`Zu wenige verschiedene Einträge für ein ${size}×${size}-Raster. Benötigt: ${cellsPerCard}, verfügbar: ${pool.length}.`);
      }
      const cards = [];
      const signatures = new Set();
      let attempts = 0;
      const maxAttempts = Math.max(5000, count * 400);
      while (cards.length < count && attempts < maxAttempts) {
        attempts++;
        const selection = shuffle(pool).slice(0, cellsPerCard);
        const signature = selection.map(item => item.id).sort().join('|');
        if (!signatures.has(signature)) {
          signatures.add(signature);
          cards.push({ id: cards.length + 1, entries: selection });
        }
      }
      if (cards.length < count) throw new Error('Nicht genügend einzigartige Bingo-Karten möglich. Erhöhe n oder reduziere Anzahl/Rastergröße.');
      return cards;
    }

    function Fraction({ num, den, className = '' }) {
      if (den === 1) {
        return <span className={`inline-flex items-center leading-none ${className}`}>{num}</span>;
      }

      return (
        <span className={`inline-flex flex-col items-center leading-none ${className}`} style={{verticalAlign:'middle'}}>
          <span className="border-b-[0.1em] border-current px-2 pb-[0.1em] leading-tight">{num}</span>
          <span className="px-2 pt-[0.1em] leading-tight">{den}</span>
        </span>
      );
    }

    function Dice({ value, sides, label, rollKey }) {
      const len = String(value).length;
      // Dynamische Skalierung für reguläre Würfel-Ansicht
      const fontSize = len >= 5 ? 'text-2xl' : len === 4 ? 'text-3xl' : len === 3 ? 'text-4xl' : 'text-5xl';
      
      return (
        <div className="flex flex-col items-center gap-3">
          <div className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">{label}</div>
          <div key={rollKey} className="dice-face h-28 w-28 rounded-3xl flex items-center justify-center animate-dice-pop">
            <span className={`${fontSize} font-black text-indigo-600 select-none px-2 text-center`}>{value}</span>
          </div>
          <div className="text-xs text-slate-500">1 bis {sides}</div>
        </div>
      );
    }

    function BingoCard({ card, size, title, gameMode }) {
      return (
        <div className="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm">
          <div className="mb-3 flex items-center justify-between">
            <div>
              <div className="text-xs uppercase tracking-[0.25em] text-indigo-500 font-bold">Bingo</div>
              <div className="text-lg font-bold text-slate-800">{title}</div>
            </div>
            <div className="rounded-full bg-slate-100 px-3 py-1 text-sm font-semibold text-slate-600">{size} × {size}</div>
          </div>
          <div className="bingo-preview" style={{ gridTemplateColumns: `repeat(${size}, minmax(0, 1fr))` }}>
            {card.entries.map((entry, idx) => (
              <div
                key={`${card.id}-${idx}-${entry.id}`}
                className="bingo-cell rounded-2xl bg-white p-2 flex items-center justify-center text-center border border-slate-200"
              >
                {gameMode === 'fractions' ? (
                  <Fraction num={entry.a} den={entry.b} className="text-[clamp(0.72rem,1.3vw,0.95rem)] font-semibold text-slate-700" />
                ) : (
                  <div className="text-[clamp(0.72rem,1.3vw,0.95rem)] leading-tight font-semibold text-slate-700 break-words">
                    {entry.product}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [sides, setSides] = useState(6);
      const [sidesInput, setSidesInput] = useState('6');
      const [gridSize, setGridSize] = useState(4);
      const [gridSizeInput, setGridSizeInput] = useState('4');
      const [cardCount, setCardCount] = useState(4);
      const [cardCountInput, setCardCountInput] = useState('4');
      const [die1, setDie1] = useState(1);
      const [die2, setDie2] = useState(1);
      const [history, setHistory] = useState([]);
      const [remainingProducts, setRemainingProducts] = useState([]);
      const [cards, setCards] = useState([]);
      const [error, setError] = useState('');
      const [adminMode, setAdminMode] = useState(false);

      const [timerEnabled, setTimerEnabled] = useState(false);
      const [timerValue, setTimerValue] = useState(5);
      const [timerUnit, setTimerUnit] = useState('s');
      const [timerCountdown, setTimerCountdown] = useState(null);
      const timerRef = React.useRef(null);
      const countdownRef = React.useRef(null);

      const [rollKey, setRollKey] = useState(0);
      const [fullscreen, setFullscreen] = useState(false);

      const [gameMode, setGameMode] = useState('multiplication');
      
      const [scaleK1Input, setScaleK1Input] = useState('2');
      const [scaleK2Input, setScaleK2Input] = useState('1');
      const [scaleK3Input, setScaleK3Input] = useState('1');
      const [scaleMode, setScaleMode] = useState('k1only'); 
      const [currentK, setCurrentK] = useState(2); 

      const k1 = Math.max(1, parseInt(scaleK1Input) || 1);
      const k2 = Math.max(1, parseInt(scaleK2Input) || 1);
      const k3 = Math.max(1, parseInt(scaleK3Input) || 1);

      const productTaskMap = useMemo(() => {
        const map = new Map();
        const pool = gameMode === 'primes' ? buildPrimeTaskPool(sides) : buildTaskPool(sides);
        pool.forEach(task => {
          const key = gameMode === 'fractions'
            ? (() => { const g = gcd(task.a, task.b); return `${task.a/g}/${task.b/g}`; })()
            : task.product;
          if (!map.has(key)) map.set(key, []);
          map.get(key).push(task);
        });
        return map;
      }, [sides, gameMode]);

      const uniqueProductValues = useMemo(() => {
        const keys = Array.from(productTaskMap.keys());
        if (gameMode === 'fractions') return keys.sort((a, b) => {
          const [an, ad] = a.split('/').map(Number);
          const [bn, bd] = b.split('/').map(Number);
          return an/ad - bn/bd;
        });
        return keys.sort((a, b) => a - b);
      }, [productTaskMap, gameMode]);

      useEffect(() => {
        setRemainingProducts(uniqueProductValues);
        setHistory([]);
        setDie1(1);
        setDie2(1);
      }, [uniqueProductValues]);

      const poolStats = useMemo(() => {
        if (gameMode === 'fractions') {
          const pool = buildFractionPool(sides);
          return { totalTasks: sides * sides, uniqueProducts: pool.length };
        }
        if (gameMode === 'primes') {
          const ps = primesUpTo(sides);
          return { totalTasks: ps.length * ps.length, uniqueProducts: buildPrimeProductPool(sides).length };
        }
        const totalTasks = sides * sides;
        const uniqueProducts = buildProductPool(sides).length;
        return { totalTasks, uniqueProducts };
      }, [sides, gameMode]);

      function rollDice() {
        if (remainingProducts.length === 0) {
          setError('Alle möglichen Ergebnisse dieser Spielrunde wurden bereits gezogen. Setze die Runde zurück, um erneut zu starten.');
          return;
        }

        // Sound abspielen!
        playDiceSound();

        const kChoices = [k1, k2, k3];
        let chosenK = k1;
        if (scaleMode === 'random') chosenK = kChoices[randomInt(0, 2)];
        else if (scaleMode === 'product') chosenK = k1 * k2 * k3;
        
        setCurrentK(chosenK);

        const selectedKey = remainingProducts[randomInt(0, remainingProducts.length - 1)];
        const matchingTasks = productTaskMap.get(selectedKey) || [];
        const task = matchingTasks[randomInt(0, matchingTasks.length - 1)];

        setDie1(task.a);
        setDie2(task.b);
        setRemainingProducts(prev => prev.filter(k => k !== selectedKey));
        setHistory(prev => [{ a: task.a, b: task.b, k: chosenK, key: selectedKey, timestamp: new Date().toLocaleTimeString('de-DE') }, ...prev].slice(0, 12));
        setError('');
        setRollKey(k => k + 1);
      }

      function resetRound() {
        setTimerEnabled(false);
        stopTimer();
        setRemainingProducts(uniqueProductValues);
        setHistory([]);
        setDie1(1);
        setDie2(1);
        setError('');
        
        let chosenK = k1;
        if (scaleMode === 'random') chosenK = [k1, k2, k3][randomInt(0, 2)];
        else if (scaleMode === 'product') chosenK = k1 * k2 * k3;
        setCurrentK(chosenK);
      }

      function getTimerMs() {
        const val = parseFloat(timerValue) || 1;
        return timerUnit === 's' ? val * 1000 : val;
      }

      function startTimer() {
        stopTimer();
        const ms = getTimerMs();
        if (ms < 100) return;
        setTimerCountdown(ms);

        let remaining = ms;
        countdownRef.current = setInterval(() => {
          remaining -= 100;
          setTimerCountdown(Math.max(0, remaining));
        }, 100);

        timerRef.current = setInterval(() => {
          remaining = ms;
          setTimerCountdown(ms);
          rollDiceRef.current();
        }, ms);
      }

      function stopTimer() {
        clearInterval(timerRef.current);
        clearInterval(countdownRef.current);
        timerRef.current = null;
        countdownRef.current = null;
        setTimerCountdown(null);
      }

      const rollDiceRef = React.useRef(null);
      rollDiceRef.current = rollDice;

      useEffect(() => {
        if (timerEnabled) startTimer();
        else stopTimer();
        return () => stopTimer();
      }, [timerEnabled, timerValue, timerUnit]);

      useEffect(() => {
        if (remainingProducts.length === 0 && timerEnabled) setTimerEnabled(false);
      }, [remainingProducts]);

      function handleGenerateCards() {
        try {
          let pool;
          if (gameMode === 'fractions') pool = buildFractionPool(sides);
          else if (gameMode === 'primes') pool = buildPrimeProductPool(sides);
          else pool = buildProductPool(sides);
          const generated = generateUniqueCardsFromPool({ pool, size: gridSize, count: cardCount });
          setCards(generated);
          setError('');
        } catch (err) {
          setCards([]);
          setError(err.message || 'Fehler beim Erstellen der Bingo-Karten.');
        }
      }

      function drawCardOnPdf(doc, card, pageSlot, options) {
        const { size } = options;
        const pageWidth = 210;
        const pageHeight = 297;
        const marginX = 12;
        const gapY = 10;
        const slotHeight = (pageHeight - 20 - gapY) / 2;
        const slotY = pageSlot === 0 ? 10 : 10 + slotHeight + gapY;
        const cardX = marginX;
        const cardY = slotY;
        const cardW = pageWidth - marginX * 2;
        const headerH = 18;
        const innerPad = 4;
        const gridW = cardW - innerPad * 2;
        const gridH = slotHeight - headerH - innerPad * 2 - 4;
        const cellW = gridW / size;
        const cellH = gridH / size;

        doc.setDrawColor(203, 213, 225);
        doc.setFillColor(255, 255, 255);
        doc.roundedRect(cardX, cardY, cardW, slotHeight, 5, 5, 'FD');

        doc.setFont('helvetica', 'bold');
        doc.setTextColor(79, 70, 229);
        doc.setFontSize(11);
        doc.text(`Multiplikations-Bingo #${card.id}`, cardX + 5, cardY + 8);

        let fractionInfo = `k=${k1} (Einfach)`;
        if (scaleMode === 'random') fractionInfo = `k1=${k1}, k2=${k2}, k3=${k3} (Zufall)`;
        else if (scaleMode === 'product') fractionInfo = `k=${k1 * k2 * k3} (Produkt)`;

        doc.setTextColor(51, 65, 85);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8.5);
        doc.text(`n = ${sides} | Raster ${size}×${size} | ${gameMode === 'fractions' ? `Brüche kürzen | ${fractionInfo}` : gameMode === 'primes' ? 'Primzahlen' : 'Ergebnisse'}`, cardX + 5, cardY + 14);

        const startX = cardX + innerPad;
        const startY = cardY + headerH + innerPad;

        for (let row = 0; row < size; row++) {
          for (let col = 0; col < size; col++) {
            const idx = row * size + col;
            const entry = card.entries[idx];
            const x = startX + col * cellW;
            const y = startY + row * cellH;
            doc.setDrawColor(203, 213, 225);
            doc.setFillColor(248, 250, 252);
            doc.rect(x, y, cellW, cellH, 'FD');
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(30, 41, 59);
            const fontSize = Math.max(9, Math.min(14, cellW / 4));
            doc.setFontSize(fontSize);
            
            if (gameMode === 'fractions') {
              if (entry.b === 1) {
                const text = String(entry.a);
                const textWidth = doc.getTextWidth(text);
                const textX = x + (cellW - textWidth) / 2;
                const textY = y + (cellH / 2) + (fontSize * 0.38) / 2;
                doc.text(text, textX, textY);
              } else {
                const numStr = String(entry.a);
                const denStr = String(entry.b);
                const lineW = cellW * 0.55;
                const cx = x + cellW / 2;
                const cy = y + cellH / 2;
                doc.setDrawColor(30, 41, 59);
                doc.line(cx - lineW/2, cy, cx + lineW/2, cy);
                const numW = doc.getTextWidth(numStr);
                doc.text(numStr, cx - numW/2, cy - 1.5);
                const denW = doc.getTextWidth(denStr);
                doc.text(denStr, cx - denW/2, cy + fontSize * 0.38 + 1);
              }
            } else {
              const text = String(entry.product);
              const lines = doc.splitTextToSize(text, cellW - 4);
              const totalHeight = lines.length * (fontSize * 0.38);
              let textY = y + (cellH / 2) - totalHeight / 2 + 2;
              lines.forEach(line => {
                const textWidth = doc.getTextWidth(line);
                const textX = x + (cellW - textWidth) / 2;
                doc.text(line, textX, textY);
                textY += fontSize * 0.38 + 1.5;
              });
            }
          }
        }
      }

      function exportPdf() {
        try {
          if (!cards.length) {
            setError('Erstelle zuerst Bingo-Karten, bevor du das PDF exportierst.');
            return;
          }

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

          cards.forEach((card, index) => {
            if (index > 0 && index % 2 === 0) doc.addPage();
            drawCardOnPdf(doc, card, index % 2, { size: gridSize });
          });

          const filename = `multiplikations-bingo_n${sides}_${gridSize}x${gridSize}_${cardCount}-karten.pdf`;
          doc.save(filename);
          setError('');
        } catch (err) {
          setError(err.message || 'PDF konnte nicht erstellt werden.');
        }
      }

      const FractionSettingsBlock = () => (
        <div className="md:col-span-full rounded-2xl bg-indigo-50/50 p-4 border border-indigo-100">
          <span className="mb-3 block text-sm font-semibold text-slate-700">Erweiterungsfaktoren (für die Aufgaben)</span>
          <div className="grid grid-cols-3 gap-4">
            <label className="block">
              <div className="text-xs text-slate-500 mb-1 font-medium">k₁</div>
              <input type="text" inputMode="numeric" value={scaleK1Input}
                onChange={e => setScaleK1Input(e.target.value.replace(/[^0-9]/g, ''))}
                onBlur={() => setScaleK1Input(String(k1))}
                className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500" />
            </label>
            <label className="block">
              <div className="text-xs text-slate-500 mb-1 font-medium">k₂</div>
              <input type="text" inputMode="numeric" value={scaleK2Input}
                onChange={e => setScaleK2Input(e.target.value.replace(/[^0-9]/g, ''))}
                onBlur={() => setScaleK2Input(String(k2))}
                className={`w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 ${scaleMode === 'k1only' ? 'opacity-50 bg-slate-100' : ''}`}
                disabled={scaleMode === 'k1only'} />
            </label>
            <label className="block">
              <div className="text-xs text-slate-500 mb-1 font-medium">k₃</div>
              <input type="text" inputMode="numeric" value={scaleK3Input}
                onChange={e => setScaleK3Input(e.target.value.replace(/[^0-9]/g, ''))}
                onBlur={() => setScaleK3Input(String(k3))}
                className={`w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 ${scaleMode === 'k1only' ? 'opacity-50 bg-slate-100' : ''}`}
                disabled={scaleMode === 'k1only'} />
            </label>
          </div>
          <div className="mt-4 flex flex-wrap items-center gap-4">
            <span className="text-sm font-semibold text-slate-700">Modus:</span>
            <label className="flex items-center gap-2 text-sm cursor-pointer select-none">
              <input type="radio" name="scaleMode" value="k1only" checked={scaleMode === 'k1only'} onChange={() => setScaleMode('k1only')} className="w-5 h-5 accent-indigo-600" />
              Einfach (nur k₁)
            </label>
            <label className="flex items-center gap-2 text-sm cursor-pointer select-none">

                    </div>
                  </div>
                  
                  <div key={`fs-task-${rollKey}`} className="animate-result-flip text-center mt-12 md:mt-16 w-full">
                    <div className="text-white/60 text-xl font-bold uppercase tracking-widest mb-4">
                      {gameMode === 'fractions' ? 'Bruch kürzen' : 'Aufgabe'}
                    </div>
                    {gameMode === 'fractions' ? (
                      <div className="flex justify-center">
                        <Fraction num={currentK * die1} den={currentK * die2} className={`${getFsResultFontSize(currentK * die1, currentK * die2)} font-black text-white drop-shadow-xl`} />
                      </div>
                    ) : (
                      <div className={`${getFsResultFontSize(die1, die2)} font-black text-white drop-shadow-xl whitespace-nowrap`}>{die1} · {die2}</div>
                    )}
                  </div>
                </>
              )}
            </div>

            {/* Riesiger Würfel-Button Unten Mitte */}
            <div className="absolute bottom-10 flex flex-col items-center w-full">
              {timerEnabled && timerCountdown !== null && (
                <div className="flex flex-col items-center gap-2 mb-6 w-full max-w-md">
                  <span className="text-white/80 text-lg tabular-nums font-bold">
                    Nächster Wurf in {timerUnit === 's' ? `${(timerCountdown / 1000).toFixed(1)}s` : `${timerCountdown}ms`}
                  </span>
                  <div className="h-3 w-full rounded-full bg-white/20 overflow-hidden shadow-inner">
                    <div
                      className="h-full rounded-full bg-emerald-400 transition-all ease-linear"
                      style={{ width: `${(timerCountdown / getTimerMs()) * 100}%` }}
                    />
                  </div>
                </div>
              )}
              
              {!timerEnabled && (
                <button
                  onClick={rollDice}
                  disabled={remainingProducts.length === 0}
                  className={`rounded-full px-16 py-6 text-4xl font-black text-white shadow-[0_0_40px_rgba(16,185,129,0.4)] border-4 border-emerald-400/50 backdrop-blur-md transition-all ${remainingProducts.length === 0 ? 'bg-slate-500/50 opacity-50 border-slate-400/50 cursor-not-allowed' : 'bg-emerald-500/90 hover:bg-emerald-400 hover:scale-105 active:scale-95'}`}
                >
                  🎲 WÜRFELN
                </button>
              )}

              <div className="text-white/50 text-base font-medium mt-6">
                Noch {remainingProducts.length} von {poolStats.uniqueProducts} Ergebnissen übrig
              </div>
            </div>
            
          </div>
        )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
